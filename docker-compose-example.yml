x-backend-env: &backend-env
  NODE_ENV: development
  APP_ORIGIN: http://localhost:5173
  API_GATEWAY_URL: http://api-gateway:8080
  GATEWAY_PORT: 8080
  JWT_ACCESS_SECRET: replace-with-strong-access-secret
  JWT_REFRESH_SECRET: replace-with-strong-refresh-secret
  JWT_ACCESS_EXPIRES_IN: 7d
  JWT_REFRESH_EXPIRES_IN: 7d
  REDIS_URL: redis://redis:6379
  TYPESENSE_PROTOCOL: http
  TYPESENSE_HOST: typesense
  TYPESENSE_PORT: 8108
  TYPESENSE_API_KEY: pulseroom-typesense-key
  TYPESENSE_COLLECTION: events
  MONGO_AUTH_URI: mongodb://mongo:27017/pulseroom_auth
  MONGO_USER_URI: mongodb://mongo:27017/pulseroom_user
  MONGO_EVENT_URI: mongodb://mongo:27017/pulseroom_event
  MONGO_BOOKING_URI: mongodb://mongo:27017/pulseroom_booking
  MONGO_CHAT_URI: mongodb://mongo:27017/pulseroom_chat
  MONGO_NOTIFICATION_URI: mongodb://mongo:27017/pulseroom_notification
  MONGO_LIVE_URI: mongodb://mongo:27017/pulseroom_live
  MONGO_ADMIN_URI: mongodb://mongo:27017/pulseroom_admin
  AUTH_SERVICE_URL: http://auth-service:4001
  USER_SERVICE_URL: http://user-service:4002
  EVENT_SERVICE_URL: http://event-service:4003
  BOOKING_SERVICE_URL: http://booking-service:4004
  CHAT_SERVICE_URL: http://chat-service:4005
  NOTIFICATION_SERVICE_URL: http://notification-service:4006
  LIVE_SERVICE_URL: http://live-service:4007
  ADMIN_SERVICE_URL: http://admin-service:4008
  AUTH_PORT: 4001
  USER_PORT: 4002
  EVENT_PORT: 4003
  BOOKING_PORT: 4004
  CHAT_PORT: 4005
  NOTIFICATION_PORT: 4006
  LIVE_PORT: 4007
  ADMIN_PORT: 4008
  PAYMENT_PROVIDER: manual
  STRIPE_SECRET_KEY: ''
  STRIPE_WEBHOOK_SECRET: ''
  MAIL_FROM: noreply@pulseroom.dev
  SMTP_HOST: mailhog
  SMTP_PORT: 1025
  SMTP_USER: ''
  SMTP_PASS: ''
  CLOUDINARY_CLOUD_NAME: 
  CLOUDINARY_API_KEY: 
  CLOUDINARY_API_SECRET: 
  GEMINI_API_KEY: 
  GEMINI_MODEL: gemini-2.5-flash-lite

x-frontend-env: &frontend-env
  VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
  VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8080}

# ── Shared DNS config ─────────────────────────────────────────────────────────
# Applied to every service that makes outbound HTTP calls (Cloudinary, Gemini,
# Stripe, SMTP, etc.).  Docker Desktop on Windows often cannot resolve external
# hostnames using the default 127.0.0.11 resolver; pinning to Google Public DNS
# (8.8.8.8 / 8.8.4.4) fixes it.
x-dns: &dns
  dns:
    - 8.8.8.8
    - 8.8.4.4

services:
  mongo:
    image: mongo:7
    container_name: pulseroom-mongo
    ports:
      - '27018:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - pulseroom

  redis:
    image: redis:7-alpine
    container_name: pulseroom-redis
    ports:
      - '6379:6379'
    networks:
      - pulseroom

  typesense:
    image: typesense/typesense:0.25.2
    container_name: pulseroom-typesense
    command: '--data-dir /data --api-key=pulseroom-typesense-key --enable-cors'
    ports:
      - '8108:8108'
    volumes:
      - typesense-data:/data
    networks:
      - pulseroom

  mailhog:
    image: mailhog/mailhog
    container_name: pulseroom-mailhog
    ports:
      - '8025:8025'
      - '1025:1025'
    networks:
      - pulseroom

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  # user-service makes outbound calls to Cloudinary — DNS is critical here
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  # event-service calls Gemini AI API
  event-service:
    build:
      context: .
      dockerfile: services/event-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
      - typesense
    networks:
      - pulseroom
    <<: *dns

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
      - mailhog
    networks:
      - pulseroom
    <<: *dns

  live-service:
    build:
      context: .
      dockerfile: services/live-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      - mongo
      - redis
    networks:
      - pulseroom
    <<: *dns

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      <<: *backend-env
    ports:
      - '8080:8080'
    depends_on:
      - auth-service
      - user-service
      - event-service
      - booking-service
      - chat-service
      - notification-service
      - live-service
      - admin-service
    networks:
      - pulseroom
    <<: *dns

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      <<: *frontend-env
    ports:
      - '5173:5173'
    depends_on:
      - api-gateway
    networks:
      - pulseroom
    <<: *dns

volumes:
  mongo-data:
  typesense-data:

# ── Named network with explicit driver ───────────────────────────────────────
# Using a named bridge network (instead of the default auto-created one) lets
# Docker Desktop on Windows apply DNS settings consistently across containers.
networks:
  pulseroom:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: pulseroom-net
